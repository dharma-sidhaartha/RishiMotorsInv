<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Invoice</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#F5F0E8;
  --editor:#FFFFFF;
  --text:#1A1410;
  --text2:#5C5347;
  --muted:#8A7F72;
  --border:#E0D8CC;
  --accent:#B8913A;
  --gold:#D4AF5A;
  --top-line:linear-gradient(90deg,#7A5C1F,#B8913A,#D4C48A,#B8913A,#7A5C1F);
}

*{box-sizing:border-box;margin:0}
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

.topbar{
  padding:14px 24px;
  display:flex;justify-content:space-between;align-items:center;
  background:white;
  border-bottom:1px solid var(--border);
  flex-wrap:wrap;gap:10px;
}
.topbar h1{font-family:'Playfair Display',serif;font-size:20px;margin:0}
.buttons{display:flex;gap:8px}
button{
  padding:9px 16px;border-radius:100px;border:1px solid var(--border);
  background:white;color:var(--text);font-weight:600;cursor:pointer;
}
button:hover{border-color:var(--accent);color:var(--accent)}
button.primary{background:var(--text);color:white;border:none}

.sync-badge{
  position:fixed;top:72px;right:18px;z-index:60;
  padding:7px 14px;border-radius:100px;font-size:12px;font-weight:700;
  color:white;background:#888;
  display:flex;align-items:center;gap:6px;
}
.sync-badge.ok{background:#2D6A4F}
.sync-badge.saving{background:#B8913A}
.sync-badge.error{background:#C0392B}

.wrap{
  display:grid;
  grid-template-columns:400px 1fr;
  gap:28px;
  padding:28px;
  max-width:1480px;
  margin:auto;
  align-items:start;
}

.editor{
  position:sticky;top:80px;
  background:var(--editor);
  border:1px solid var(--border);
  border-radius:16px;
  box-shadow:0 20px 50px rgba(0,0,0,.06);
}
.editor-head{
  padding:18px 22px;
  border-bottom:1px solid var(--border);
}
.editor-head h2{font-family:'Playfair Display',serif;font-size:20px}
.editor-head span{font-size:12px;color:var(--muted)}

.body{padding:18px 22px}

.sec-title{
  font-size:11px;font-weight:800;text-transform:uppercase;
  letter-spacing:1.5px;color:var(--accent);
  margin:20px 0 10px;
  display:flex;align-items:center;gap:10px;
}
.sec-title::before,.sec-title::after{content:"";flex:1;height:1px;background:var(--border)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);display:block;margin-bottom:4px}

input,textarea{
  width:100%;padding:11px 12px;
  border:1px solid var(--border);border-radius:10px;
  font-size:14px;font-family:'Inter',sans-serif;
  background:#FDFBF7;color:var(--text);outline:none;
}
input:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(184,145,58,.1)}
textarea{min-height:70px;resize:vertical}

.irow{display:grid;grid-template-columns:1fr 65px 90px 36px;gap:8px;margin-bottom:8px;align-items:center}
.rdel{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:none;font-size:16px;cursor:pointer;color:var(--muted)}
.rdel:hover{background:var(--accent);border-color:var(--accent);color:white}

.addbtn{width:100%;padding:10px;margin-top:6px;border:1px dashed var(--border);border-radius:10px;background:none;color:var(--accent);font-weight:700;cursor:pointer}

.eactions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:20px}

/* Preview */
.prevcol{min-width:0}
.prevlabel{display:flex;justify-content:space-between;margin:0 0 12px 4px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted)}
.prevframe{width:100%;overflow:hidden;display:flex;justify-content:center}
.prevscale{transform-origin:top center}

/* Invoice A4 */
.invoice{
  width:210mm;min-height:297mm;
  background:white;
  padding:18mm;
  position:relative;
  box-shadow:0 30px 80px rgba(0,0,0,.12);
}
.invoice::before{
  content:"";position:absolute;top:0;left:0;right:0;height:5px;
  background:var(--top-line);
}

.inv-head{display:flex;justify-content:space-between;gap:28px;padding-bottom:14px;margin-bottom:16px;border-bottom:1px solid var(--border)}
.inv-co h1{font-family:'Playfair Display',serif;font-size:26pt;margin:0 0 5px;color:var(--text)}
.inv-co p{white-space:pre-line;font-size:9.5pt;line-height:1.5;color:#777;margin:0}
.inv-right{text-align:right;min-width:170px}
.inv-title{font-family:'Playfair Display',serif;font-size:30pt;letter-spacing:2px;text-transform:uppercase;margin:0 0 8px}
.inv-line{font-size:9.5pt;color:#888;margin-top:4px}
.inv-line b{color:var(--text)}

.inv-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.inv-card{padding:13px;border-radius:8px;background:#F8F7F4;border:1px solid #EDEAE4}
.inv-card .lbl{font-size:8pt;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:5px}
.inv-card .val{font-size:11pt;font-weight:600}
.inv-card .sub{font-size:9.5pt;color:#777;margin-top:2px}
.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.inv-sec{margin:22px 0 8px;font-family:'Playfair Display',serif;font-size:13pt;color:var(--accent);display:flex;align-items:center;gap:10px}
.inv-sec::after{content:"";flex:1;height:1px;background:#E0E0E0}

.inv-tbl{width:100%;border-collapse:collapse}
.inv-tbl th{padding:8px 0;font-size:8pt;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#888;text-align:left;border-bottom:2px solid var(--text)}
.inv-tbl td{padding:7px 0;font-size:10pt;border-bottom:1px solid #EDEAE4}
.inv-tbl th:nth-child(n+2),.inv-tbl td:nth-child(n+2){text-align:right}

.inv-totals{width:260px;max-width:100%;margin-left:auto;margin-top:14px}
.trow{display:flex;justify-content:space-between;padding:5px 0;font-size:10pt;color:#666}
.trow.grand{border-top:2px solid var(--text);margin-top:8px;padding-top:10px;font-family:'Playfair Display',serif;font-size:16pt;font-weight:700}

.inv-footer{margin-top:28px;padding-top:12px;border-top:1px solid #E0E0E0;text-align:center;font-size:9pt;color:#999;font-style:italic}

@media(max-width:1100px){.wrap{grid-template-columns:1fr}.editor{position:relative;top:0}}
@media(max-width:680px){
  .wrap{padding:16px;gap:18px}
  .grid2{grid-template-columns:1fr}
  .irow{grid-template-columns:1fr 60px 82px 32px}
  .inv-cards{grid-template-columns:1fr}
  .vgrid{grid-template-columns:1fr}
  .inv-head{flex-direction:column;gap:14px}
  .inv-right{text-align:left}
  .invoice{padding:20px}
  .buttons{width:100%}
  .buttons button{flex:1;text-align:center}
}
@media print{
  body{background:white;padding:0;margin:0}
  .topbar,.editor,.sync-badge,.prevlabel,.buttons{display:none!important}
  .wrap{display:block;padding:0;max-width:none}
  .prevframe{overflow:visible}
  .prevscale{transform:none!important;width:auto!important;height:auto!important}
  .invoice{width:100%;min-height:auto;box-shadow:none;border-radius:0;padding:14mm}
}
</style>
</head>
<body>

<div class="sync-badge" id="syncBadge">
  <span id="syncDot">●</span>
  <span id="syncMsg">Connecting</span>
</div>

<div class="topbar">
  <h1>Auto Invoice</h1>
  <div class="buttons">
    <button onclick="copyLink()">📋 Copy Link</button>
    <button onclick="newInvoice()">✨ New</button>
    <button class="primary" onclick="window.print()">📄 PDF</button>
  </div>
</div>

<div class="wrap">

  <!-- Editor -->
  <aside class="editor">
    <div class="editor-head">
      <h2>Invoice Editor</h2>
      <span id="linkDisplay" style="font-size:12px;color:var(--muted);word-break:break-all;"></span>
    </div>
    <div class="body">

      <div class="sec-title">Customer & Vehicle</div>
      <div class="grid2">
        <div class="field">
          <label>Customer Name</label>
          <input id="fName" placeholder="Customer name">
        </div>
        <div class="field">
          <label>Phone</label>
          <input id="fPhone" placeholder="98765 43210">
        </div>
        <div class="field">
          <label>Car Model</label>
          <input id="fCar" placeholder="Maruti Swift">
        </div>
        <div class="field">
          <label>Kilometers</label>
          <input id="fKm" placeholder="45,200 km">
        </div>
        <div class="field">
          <label>Invoice Date</label>
          <input id="fDate" type="date">
        </div>
        <div class="field">
          <label>Invoice No</label>
          <input id="fInv">
        </div>
      </div>

      <div class="sec-title">Accessories & Parts</div>
      <div id="partsList"></div>
      <button class="addbtn" onclick="addRow('parts')">+ Add Part</button>

      <div class="sec-title">Labor & Other</div>
      <div id="laborList"></div>
      <button class="addbtn" onclick="addRow('labor')">+ Add Labor</button>

      <div class="sec-title">Notes</div>
      <textarea id="fNotes" placeholder="Thank you for your business."></textarea>

      <div class="eactions">
        <button onclick="clearAll()">Clear All</button>
        <button class="primary" onclick="window.print()">Print PDF</button>
      </div>
    </div>
  </aside>

  <!-- Preview -->
  <main class="prevcol">
    <div class="prevlabel" style="display:none"></div>
    <div class="prevframe">
      <div class="prevscale" id="scaler">
        <section class="invoice" id="invoiceEl">

          <div class="inv-head">
            <div class="inv-co">
              <h1 id="coName"></h1>
              <p id="coDetails"></p>
            </div>
            <div class="inv-right">
              <div class="inv-title">Invoice</div>
              <div class="inv-line">No. <b id="pInv"></b></div>
              <div class="inv-line">Date <b id="pDate"></b></div>
            </div>
          </div>

          <div class="inv-cards">
            <div class="inv-card">
              <div class="lbl">Bill To</div>
              <div class="val" id="pName">—</div>
              <div class="sub" id="pPhone">—</div>
            </div>
            <div class="inv-card">
              <div class="lbl">Vehicle</div>
              <div class="vgrid">
                <div>
                  <div class="sub">Model</div>
                  <div class="val" id="pCar">—</div>
                </div>
                <div>
                  <div class="sub">Odometer</div>
                  <div class="val" id="pKm">—</div>
                </div>
              </div>
            </div>
          </div>

          <div class="inv-sec">Accessories & Parts</div>
          <table class="inv-tbl">
            <thead><tr><th>Description</th><th>Qty</th><th>Rate</th><th>Amount</th></tr></thead>
            <tbody id="pParts"></tbody>
          </table>

          <div class="inv-sec">Labor & Other</div>
          <table class="inv-tbl">
            <thead><tr><th>Description</th><th>Qty</th><th>Rate</th><th>Amount</th></tr></thead>
            <tbody id="pLabor"></tbody>
          </table>

          <div class="inv-totals">
            <div class="trow">Parts Total <span id="pPartT">₹0.00</span></div>
            <div class="trow">Labor Total <span id="pLabT">₹0.00</span></div>
            <div class="trow grand">Grand Total <span id="pGrand">₹0.00</span></div>
          </div>

          <div class="inv-footer" id="pNotes"></div>

        </section>
      </div>
    </div>
  </main>

</div>

<script>
/* ════════════════════════════════
   FIREBASE CONFIG — REPLACE THIS
   ════════════════════════════════ */
const firebaseConfig = {
apiKey: "AIzaSyCH5lWduhcIp4OJZv5ROx56nBnbydoqvnE",
  authDomain: "rishimotors-86908.firebaseapp.com",
  projectId: "rishimotors-86908",
  storageBucket: "rishimotors-86908.firebasestorage.app",
  messagingSenderId: "946307912850",
  appId: "1:946307912850:web:3f8b293e4ffb850a25024b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ════════════════════════════════
   COMPANY DETAILS — EDIT HERE
   ════════════════════════════════ */
const CO = {
  name: "PREMIER AUTO CARE",
  details: "Shop No. 12, Main Market Road\nNew Delhi — 110001\n+91 98765 43210\ninfo@premierautocare.in",
  note: "Thank you for your business. Goods once sold will not be taken back."
};

/* ════════════════════════════════
   GLOBALS
   ════════════════════════════════ */
const $ = id => document.getElementById(id);
const FIELDS = ["fName","fPhone","fCar","fKm","fDate","fInv","fNotes"];
const CUR = "₹";

let docRef = null;
let isRemote = false;
let saveTimer = null;
let currentID = null;

/* ════════════════════════════════
   SYNC UI
   ════════════════════════════════ */
function setSync(state, msg) {
  const badge = $("syncBadge");
  badge.className = "sync-badge " + state;
  const dot = $("syncDot");
  const msgt = $("syncMsg");

  if (state === "ok") {
    dot.textContent = "✓";
    msgt.textContent = msg || "Synced";
  } else if (state === "saving") {
    dot.textContent = "●";
    msgt.textContent = msg || "Saving...";
  } else if (state === "error") {
    dot.textContent = "!";
    msgt.textContent = msg || "Error";
  } else {
    dot.textContent = "●";
    msgt.textContent = msg || "Offline";
  }
}

/* ════════════════════════════════
   GET OR CREATE INVOICE ID
   ════════════════════════════════ */
function getInvoiceID() {
  // Try to get ID from URL first
  const params = new URLSearchParams(window.location.search);
  let id = params.get("id");

  if (id) {
    return id; // Use existing ID from URL
  }

  // Generate new ID
  id = "inv_" + Math.random().toString(36).substring(2, 10) + Date.now().toString(36);

  // Add ID to URL
  params.set("id", id);
  const newURL = window.location.pathname + "?" + params.toString();
  window.history.replaceState({}, "", newURL);

  return id;
}

/* ════════════════════════════════
   COPY LINK
   ════════════════════════════════ */
function copyLink() {
  const url = window.location.href;
  navigator.clipboard.writeText(url).then(() => {
    setSync("ok", "Link copied!");
    setTimeout(() => setSync("ok"), 2000);
  }).catch(() => {
    alert("Copy this link:\n" + url);
  });
}

/* ════════════════════════════════
   NEW INVOICE
   ════════════════════════════════ */
function newInvoice() {
  if (!confirm("Start a new invoice? This creates a new link.")) return;

  const id = "inv_" + Math.random().toString(36).substring(2, 10) + Date.now().toString(36);
  window.location.href = window.location.pathname + "?id=" + id;
}

/* ════════════════════════════════
   MONEY FORMAT
   ════════════════════════════════ */
function money(v) {
  return CUR + Number(v || 0).toLocaleString("en-IN", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
}

/* ════════════════════════════════
   DATE FORMAT
   ════════════════════════════════ */
function fmtDate(d) {
  if (!d) return "—";
  return new Date(d).toLocaleDateString("en-IN", {
    day: "2-digit", month: "short", year: "numeric"
  });
}

/* ════════════════════════════════
   INVOICE NUMBER
   ════════════════════════════════ */
function makeInvNo() {
  const d = new Date();
  return "INV-" +
    d.getFullYear() +
    String(d.getMonth() + 1).padStart(2, "0") +
    String(d.getDate()).padStart(2, "0") +
    "-" +
    String(d.getHours()).padStart(2, "0") +
    String(d.getMinutes()).padStart(2, "0");
}

/* ════════════════════════════════
   ADD ITEM ROW
   ════════════════════════════════ */
function addRow(type, data) {
  const row = document.createElement("div");
  row.className = "irow";

  const inp1 = document.createElement("input");
  inp1.className = "idesc";
  inp1.placeholder = "Description";

  const inp2 = document.createElement("input");
  inp2.className = "iqty";
  inp2.type = "number";
  inp2.min = "0";
  inp2.value = "1";

  const inp3 = document.createElement("input");
  inp3.className = "irate";
  inp3.type = "number";
  inp3.min = "0";
  inp3.step = "0.01";
  inp3.value = "0";

  const del = document.createElement("button");
  del.className = "rdel";
  del.textContent = "×";
  del.onclick = function() {
    row.remove();
    updatePreview();
    debounceSave();
  };

  if (data) {
    inp1.value = data.d || "";
    inp2.value = data.q || 1;
    inp3.value = data.r || 0;
  }

  [inp1, inp2, inp3].forEach(function(inp) {
    inp.addEventListener("input", function() {
      updatePreview();
      debounceSave();
    });
  });

  row.appendChild(inp1);
  row.appendChild(inp2);
  row.appendChild(inp3);
  row.appendChild(del);

  (type === "parts" ? $("partsList") : $("laborList")).appendChild(row);
}

/* ════════════════════════════════
   READ ALL ITEM ROWS
   ════════════════════════════════ */
function readRows(id) {
  var rows = document.querySelectorAll("#" + id + " .irow");
  var arr = [];
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    arr.push({
      d: r.querySelector(".idesc").value,
      q: r.querySelector(".iqty").value,
      r: r.querySelector(".irate").value
    });
  }
  return arr;
}

/* ════════════════════════════════
   CALCULATE TABLE
   ════════════════════════════════ */
function calcTable(listId, tbodyId) {
  var rows = document.querySelectorAll("#" + listId + " .irow");
  var tbody = $(tbodyId);
  tbody.innerHTML = "";

  var total = 0;
  var hasItems = false;

  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var desc = r.querySelector(".idesc").value.trim();
    var qty = parseFloat(r.querySelector(".iqty").value) || 0;
    var rate = parseFloat(r.querySelector(".irate").value) || 0;

    if (!desc && qty === 0 && rate === 0) continue;

    hasItems = true;
    var amt = qty * rate;
    total += amt;

    var tr = document.createElement("tr");
    tr.innerHTML =
      "<td>" + (desc || "—") + "</td>" +
      "<td>" + qty + "</td>" +
      "<td>" + money(rate) + "</td>" +
      "<td>" + money(amt) + "</td>";
    tbody.appendChild(tr);
  }

  if (!hasItems) {
    var tr = document.createElement("tr");
    tr.innerHTML = '<td colspan="4" style="text-align:center;color:#BBB;font-style:italic">No items</td>';
    tbody.appendChild(tr);
  }

  return total;
}

/* ════════════════════════════════
   UPDATE PREVIEW
   ════════════════════════════════ */
function updatePreview() {
  $("coName").textContent = CO.name;
  $("coDetails").textContent = CO.details;

  $("pName").textContent = $("fName").value || "—";
  $("pPhone").textContent = $("fPhone").value || "—";
  $("pCar").textContent = $("fCar").value || "—";
  $("pKm").textContent = $("fKm").value || "—";
  $("pInv").textContent = $("fInv").value || "—";
  $("pDate").textContent = fmtDate($("fDate").value);

  var pt = calcTable("partsList", "pParts");
  var lt = calcTable("laborList", "pLabor");

  $("pPartT").textContent = money(pt);
  $("pLabT").textContent = money(lt);
  $("pGrand").textContent = money(pt + lt);

  $("pNotes").textContent = $("fNotes").value || CO.note;
}

/* ════════════════════════════════
   SAVE TO FIREBASE
   ════════════════════════════════ */
function getFormData() {
  var data = {};
  for (var i = 0; i < FIELDS.length; i++) {
    data[FIELDS[i]] = $(FIELDS[i]).value;
  }
  data.parts = readRows("partsList");
  data.labor = readRows("laborList");
  data.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
  return data;
}

function saveToFirebase() {
  if (!docRef || isRemote) return;
  setSync("saving");
  docRef.set(getFormData(), { merge: true })
    .then(function() {
      setSync("ok");
    })
    .catch(function(err) {
      console.error("Save error:", err);
      setSync("error");
    });
}

function debounceSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToFirebase, 600);
}

/* ════════════════════════════════
   LOAD FROM FIREBASE
   ════════════════════════════════ */
function loadFormData(data) {
  for (var i = 0; i < FIELDS.length; i++) {
    var id = FIELDS[i];
    if (data[id] !== undefined) {
      $(id).value = data[id];
    }
  }

  $("partsList").innerHTML = "";
  $("laborList").innerHTML = "";

  var parts = data.parts || [];
  var labor = data.labor || [];

  if (parts.length === 0) {
    addRow("parts");
  } else {
    for (var j = 0; j < parts.length; j++) {
      addRow("parts", parts[j]);
    }
  }

  if (labor.length === 0) {
    addRow("labor");
  } else {
    for (var k = 0; k < labor.length; k++) {
      addRow("labor", labor[k]);
    }
  }
}

/* ════════════════════════════════
   START FIRESTORE SYNC
   ════════════════════════════════ */
function startFirestoreSync() {
  currentID = getInvoiceID();

  // Show current link in editor
  $("linkDisplay").textContent = "ID: " + currentID;

  docRef = db.collection("sharedInvoices").doc(currentID);

  setSync("saving", "Loading...");

  // Real-time listener
  docRef.onSnapshot(
    function(snap) {
      if (snap.exists) {
        isRemote = true;
        loadFormData(snap.data());
        updatePreview();
        isRemote = false;
        setSync("ok");
      } else {
        // First time - save default data
        saveToFirebase();
      }
    },
    function(err) {
      console.error("Firestore error:", err);
      setSync("error", "Connection error");
    }
  );
}

/* ════════════════════════════════
   FIT PREVIEW TO SCREEN
   ════════════════════════════════ */
function fitPreview() {
  var scaler = $("scaler");
  var wrap = scaler.parentElement;
  var inv = $("invoiceEl");

  scaler.style.transform = "none";
  scaler.style.width = "auto";
  scaler.style.height = "auto";

  var available = wrap.clientWidth;
  var fullWidth = inv.offsetWidth;

  if (available < fullWidth) {
    var scale = available / fullWidth;
    scaler.style.transform = "scale(" + scale + ")";
    scaler.style.width = fullWidth + "px";
    scaler.style.height = (inv.offsetHeight * scale) + "px";
  }
}

/* ════════════════════════════════
   CLEAR ALL
   ════════════════════════════════ */
function clearAll() {
  if (!confirm("Clear all fields?")) return;

  for (var i = 0; i < FIELDS.length; i++) {
    $(FIELDS[i]).value = "";
  }

  $("fDate").value = new Date().toISOString().slice(0, 10);
  $("fInv").value = makeInvNo();

  $("partsList").innerHTML = "";
  $("laborList").innerHTML = "";
  addRow("parts");
  addRow("labor");

  updatePreview();
  saveToFirebase();
}

/* ════════════════════════════════
   INIT
   ════════════════════════════════ */
function init() {
  // Default values
  $("fDate").value = new Date().toISOString().slice(0, 10);
  $("fInv").value = makeInvNo();

  // Add initial rows
  addRow("parts");
  addRow("labor");

  // Bind all inputs
  for (var i = 0; i < FIELDS.length; i++) {
    var id = FIELDS[i];
    $(id).addEventListener("input", function() {
      updatePreview();
      debounceSave();
    });
  }

  // Initial render
  updatePreview();
  fitPreview();

  // Watch for window resize
  window.addEventListener("resize", fitPreview);
  setTimeout(fitPreview, 500);

  // Watch invoice content for height changes
  new MutationObserver(fitPreview).observe($("invoiceEl"), {
    childList: true,
    subtree: true,
    characterData: true
  });

  // Start Firestore sync
  startFirestoreSync();
}

init();
</script>
